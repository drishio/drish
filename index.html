<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drish</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', 'Helvetica', 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #fff;
            color: #333;
        }
        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }
        .emblem {
            width: 80px;
            height: 80px;
            margin-bottom: 12px;
        }
        .brand-name {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: #333;
            margin-bottom: 4px;
        }
        .brand-sub {
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.15em;
            color: #999;
            text-transform: uppercase;
        }
        .tagline {
            font-size: 20px;
            font-weight: 300;
            letter-spacing: 0.02em;
            text-align: center;
            padding: 0 24px;
            line-height: 1.5;
            height: 4em;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tagline .text {
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }
        .tagline .text.visible {
            opacity: 1;
        }
        .tagline .text span {
            white-space: nowrap;
        }
        @media (max-width: 480px) {
            .tagline {
                height: 6em;
            }
            .tagline .text span {
                display: block;
                margin-bottom: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="brand">
        <svg class="emblem" viewBox="0 0 3071 3067" xmlns="http://www.w3.org/2000/svg">
            <rect x="100" y="100" width="2871" height="2867" rx="300" ry="300" fill="rgb(0,128,255)"/>
            <text x="1535" y="1533" dominant-baseline="central" text-anchor="middle" style="font-family:'Helvetica Neue','Helvetica',sans-serif;font-weight:700;font-size:1800px;fill:white;">d</text>
        </svg>
        <div class="brand-name">Drish</div>
        <div class="brand-sub">Steps. Paths. Routes.</div>
    </div>
    <div class="tagline">
        <div class="text visible" id="tagline"></div>
    </div>
    <script>
        const taglines = [
            ["Steps become paths.", "Paths become routes.", "Drish guides the way."],
            ["कदम राहें बनते हैं।", "राहें मार्ग बनती हैं।", "दृश् मार्ग दर्शाता है।"],
            ["Los pasos se hacen caminos.", "Los caminos se hacen rutas.", "Drish guía el camino."],
            ["步伐成为路径。", "路径成为路线。", "Drish 引领方向。"],
            ["Les pas deviennent des chemins.", "Les chemins deviennent des routes.", "Drish montre la voie."],
            ["一歩が道となり、", "道が旅路となる。", "Drish が導く。"],
            ["걸음이 길이 된다.", "길이 여정이 된다.", "Drish가 길을 안내한다."],
            ["পদক্ষেপ পথ হয়।", "পথ মার্গ হয়।", "দৃশ্ মার্গ দর্শায়।"],
            ["الخطوات تصبح مسارات.", "المسارات تصبح طرق.", "دريش يرشد الطريق."],
            ["Passos se tornam caminhos.", "Caminhos se tornam rotas.", "Drish guia o caminho."],
            ["Schritte werden Wege.", "Wege werden Routen.", "Drish weist den Weg."],
            ["Шаги становятся путями.", "Пути становятся маршрутами.", "Drish указывает путь."],
            ["Langkah menjadi jalan.", "Jalan menjadi rute.", "Drish menunjukkan arah."],
            ["Adımlar yol olur.", "Yollar rota olur.", "Drish yolu gösterir."],
            ["पावलं वाटा होतात.", "वाटा मार्ग होतात.", "दृश् मार्ग दर्शवतो."],
            ["પગલાં રસ્તા બને.", "રસ્તા માર્ગ બને.", "દૃશ્ માર્ગ દર્શાવે."],
            ["அடிகள் பாதைகளாகின்றன.", "பாதைகள் வழிகளாகின்றன.", "Drish வழிகாட்டுகிறது."],
            ["ก้าวกลายเป็นทาง.", "ทางกลายเป็นเส้นทาง.", "Drish นำทาง."],
            ["Bước chân thành lối đi.", "Lối đi thành tuyến đường.", "Drish dẫn lối."],
            ["Hatua zinakuwa njia.", "Njia zinakuwa safari.", "Drish inaongoza njia."],
            ["Kroki stają się ścieżkami.", "Ścieżki stają się trasami.", "Drish wskazuje drogę."],
            ["Stappen worden paden.", "Paden worden routes.", "Drish wijst de weg."],
            ["Кроки стають стежками.", "Стежки стають маршрутами.", "Drish вказує шлях."],
            ["گام‌ها به مسیر تبدیل می‌شوند.", "مسیرها به راه تبدیل می‌شوند.", "Drish راهنمای راه است."],
            ["צעדים הופכים לשבילים.", "שבילים הופכים למסלולים.", "Drish מוביל את הדרך."]
        ];
        let i = 0;
        const el = document.getElementById('tagline');
        function show() {
            const t = taglines[i];
            el.innerHTML = '<span>' + t[0] + '</span> <span>' + t[1] + '</span> <span>' + t[2] + '</span>';
            el.classList.add('visible');
        }
        function cycle() {
            el.classList.remove('visible');
            setTimeout(() => { i = (i + 1) % taglines.length; show(); }, 800);
        }
        show();
        setInterval(cycle, 5000);
    </script>
</body>
</html>
